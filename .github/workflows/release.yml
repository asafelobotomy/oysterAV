name: Release

on:
  push:
    branches: [main, master]
    paths:
      - VERSION

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        name: Detect VERSION bump
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            if git diff --quiet HEAD^ HEAD -- VERSION; then
              echo "VERSION unchanged vs parent — skipping."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "No parent commit; treating as first release candidate."
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Will release ${TAG}"

  prepare:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Verify VERSION is synced
        run: uv run python scripts/sync_version.py --check
      - name: Create and push tag
        run: |
          set -euo pipefail
          TAG="${{ needs.detect.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  python-dist:
    needs: [detect, prepare]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.tag }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra all
      - run: uv run python scripts/sync_version.py --check
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz

  runtime:
    needs: [detect, prepare]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.tag }}
      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd curl
      - run: bash scripts/build_runtime.sh x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-x86_64
          path: dist/runtime-x86_64.tar.zst

  flatpak:
    needs: [detect, prepare]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.tag }}
      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
      - name: Build Flatpak bundle
        run: bash scripts/build_flatpak.sh x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: dist/*.flatpak

  native-pkgs:
    needs: [detect, prepare]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.tag }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install fpm dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm
      - name: Build DEB and RPM
        run: |
          uv sync --extra all
          export PYTHON_BIN="$(uv run which python)"
          bash scripts/build_native_packages.sh x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: native-pkgs
          path: |
            dist/*.deb
            dist/*.rpm

  arch:
    needs: [detect, prepare]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.tag }}
      - name: Render PKGBUILD
        run: bash scripts/render_arch_pkgbuild.sh
      - uses: actions/upload-artifact@v4
        with:
          name: arch-pkgbuild
          path: |
            dist/PKGBUILD
            dist/.SRCINFO

  release:
    needs: [detect, prepare, python-dist, runtime, flatpak, native-pkgs, arch]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.tag }}
      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: List assets
        run: find release-assets -type f | sort
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          name: oysterAV ${{ needs.detect.outputs.version }}
          body: ${{ steps.cliff.outputs.changelog }}
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
