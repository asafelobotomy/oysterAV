name: Release

on:
  push:
    branches: [main, master]
    paths:
      - VERSION
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (empty = VERSION file)"
        required: false
        type: string
        default: ""
      force:
        description: "Rebuild and (re)publish even if the tag already exists"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
      force: ${{ steps.detect.outputs.force }}
      build_ref: ${{ steps.detect.outputs.build_ref }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - id: detect
        name: Detect release candidate
        run: |
          set -euo pipefail
          FORCE="false"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force }}" == "true" ]]; then
            FORCE="true"
          fi
          echo "force=${FORCE}" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          else
            VERSION="$(tr -d '[:space:]' < VERSION)"
          fi
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Force republish builds from the workflow commit (packaging fixes) while
          # still attaching assets to the existing tag. Normal cuts build the tag tip.
          if [[ "$FORCE" == "true" ]]; then
            echo "build_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "Force republish requested for ${TAG} from ${{ github.sha }}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "build_ref=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping release (use workflow_dispatch force=true to republish)."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual dispatch for new tag ${TAG}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            if git diff --quiet HEAD^ HEAD -- VERSION; then
              echo "VERSION unchanged vs parent — skipping."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "No parent commit; treating as first release candidate."
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Will release ${TAG}"

  prepare:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Verify VERSION is synced
        run: |
          set -euo pipefail
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          EXPECTED="${{ needs.detect.outputs.version }}"
          if [[ "$FILE_VERSION" != "$EXPECTED" ]]; then
            echo "VERSION file (${FILE_VERSION}) does not match release version (${EXPECTED})" >&2
            exit 1
          fi
          uv run python scripts/sync_version.py --check
      - name: Create and push tag if missing
        run: |
          set -euo pipefail
          TAG="${{ needs.detect.outputs.tag }}"
          git fetch --tags origin
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — leaving in place."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  python-dist:
    needs: [detect, prepare]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.detect.outputs.build_ref }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install GUI native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            python3-dev \
            libcairo2-dev \
            libgirepository-2.0-dev \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1
      - run: uv sync --extra all
      - run: uv run python scripts/sync_version.py --check
      - run: uv build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz

  runtime:
    needs: [detect, prepare]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.detect.outputs.build_ref }}
      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd curl
      - run: bash scripts/build_runtime.sh x86_64
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: runtime-x86_64
          path: dist/runtime-x86_64.tar.zst

  flatpak:
    needs: [detect, prepare]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.detect.outputs.build_ref }}
      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
      - name: Build Flatpak bundle
        run: bash scripts/build_flatpak.sh x86_64
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: flatpak
          path: dist/*.flatpak

  native-pkgs:
    needs: [detect, prepare]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.detect.outputs.build_ref }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install fpm dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm \
            pkg-config python3-dev libcairo2-dev libgirepository-2.0-dev \
            gir1.2-gtk-4.0 gir1.2-adw-1
          sudo gem install --no-document fpm
      - name: Build DEB and RPM
        run: |
          uv sync --extra all
          export PYTHON_BIN="$(uv run which python)"
          bash scripts/build_native_packages.sh x86_64
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: native-pkgs
          path: |
            dist/*.deb
            dist/*.rpm

  arch:
    needs: [detect, prepare]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.detect.outputs.build_ref }}
      - name: Render PKGBUILD
        run: bash scripts/render_arch_pkgbuild.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: arch-pkgbuild
          include-hidden-files: true
          path: |
            dist/PKGBUILD
            dist/.SRCINFO

  release:
    needs: [detect, prepare, python-dist, runtime, flatpak, native-pkgs, arch]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.build_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate release notes (latest section)
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md
      - name: Generate full CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
        env:
          OUTPUT: CHANGELOG_FULL.md
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true
      - name: List assets
        run: find release-assets -type f | sort
      - name: Stage assets for upload
        run: |
          set -euo pipefail
          mkdir -p staged
          find release-assets -type f -exec cp -t staged {} +
          # GitHub Release asset names cannot be leading-dot; publish as SRCINFO.
          if [[ -f staged/.SRCINFO ]]; then
            mv staged/.SRCINFO staged/SRCINFO
          elif [[ ! -f staged/SRCINFO ]]; then
            echo "ERROR: .SRCINFO/SRCINFO missing from arch artifact" >&2
            find release-assets -type f | sort >&2
            exit 1
          fi
          ls -la staged
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          name: oysterAV ${{ needs.detect.outputs.version }}
          body_path: CHANGELOG_RELEASE.md
          files: staged/*
          fail_on_unmatched_files: true
          generate_release_notes: false
          make_latest: true
          draft: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit full CHANGELOG.md to main
        run: |
          set -euo pipefail
          VERSION="${{ needs.detect.outputs.version }}"
          cp CHANGELOG_FULL.md /tmp/CHANGELOG.md
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/CHANGELOG.md CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "CHANGELOG.md already up to date."
            exit 0
          fi
          git commit -m "docs(changelog): v${VERSION}"
          git push origin main
