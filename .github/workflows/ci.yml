name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      # PyGObject → pycairo needs cairo headers (uv sync --extra all / gui).
      - name: Install GUI native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            python3-dev \
            libcairo2-dev \
            libgirepository-2.0-dev \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1
      - run: uv sync --extra all
      - name: Version files must match VERSION
        run: uv run python scripts/sync_version.py --check
      - name: Production files must stay within 400-line hard limit
        run: uv run python scripts/check_loc.py
      - run: uv run ruff format --check oyst_core oyst_cli oysterav tests
      - run: uv run ruff check oyst_core oyst_cli oysterav tests
      - run: uv run mypy oyst_core oyst_cli oysterav
      # Coverage sources + fail_under: pyproject.toml. Do not add --cov=oysterav.
      - run: uv run pytest tests/ --cov=oyst_core --cov=oyst_cli --cov-report=term-missing
      - run: uv tool run bandit -r oyst_core oyst_cli -ll
      - run: uv tool run pip-audit
      - name: GUI must not call security binaries directly
        run: |
          ! rg -n "subprocess\.(run|call|Popen)|os\.system|\bpkexec\b|\bsystemctl\b.*\bclam|rkhunter|chkrootkit|lynis|ufw|firewall-cmd" oysterav/ || \
            (echo "GUI must use OystClient only" && exit 1)
