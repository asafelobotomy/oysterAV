name: Runtime bundle

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/build_runtime.sh"
      - "oyst_core/runtime/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd curl
      - name: Build runtime tarball
        run: bash scripts/build_runtime.sh x86_64
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runtime-x86_64
          path: dist/runtime-x86_64.tar.zst
